name: MLops CI

on:
  push:
    branches: 
      - main
  pull_request:
    branches: 
      - main

jobs:
  workflow:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11.5'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Data Processing Tests
      run: |
        python src/data/run_processing.py \
          --input data/processed/cleaned_house_data.csv \
          --output data/processed/featured_house_data.csv \
          --preprocessor models/trained/preprocessor.pkl

    - name: Start MLflow Tracking Server
      run: |
        docker pull ghcr.io/mlflow/mlflow:latest
        docker run -d --name mlflow-tracking-server -p 5555:5000 ghcr.io/mlflow/mlflow:latest \
          mlflow server --host 0.0.0.0 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /tmp/mlruns

    - name: Train the Model
      run: |
        python src/models/train_model.py \
          --config configs/model_config.yaml \
          --data data/processed/featured_house_data.csv \
          --models-dir models \
          --mlflow-tracking-uri http://localhost:5555

    - name: Cleanup MLflow Tracking Server
      run: |
        docker stop mlflow-tracking-server
        docker rm mlflow-tracking-server 
        docker rmi ghcr.io/mlflow/mlflow:latest

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        #username: ${{ secrets.DOCKER_USERNAME }}
        username: yshmael01
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and Push Docker Images
      uses: docker/build-push-action@v6
      with:
        context: "."
        push: true
        tags: yshmael01/fastapi:{{ github.sha }}
        file: "Dockerfile"  